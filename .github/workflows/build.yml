name: Build

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run tests
        run: pytest -v

  build-binaries:
    name: Build ${{ matrix.artifact_name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cleanix-linux-amd64
          - os: macos-latest
            artifact_name: cleanix-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build binary
        run: pyinstaller --onefile --name cleanix --clean scripts/cleanix_entry.py

      - name: Test binary
        run: |
          chmod +x dist/cleanix
          ./dist/cleanix --version
          ./dist/cleanix --help
          ./dist/cleanix list >/dev/null

      - name: Rename binary
        run: mv dist/cleanix dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 7

  build-package:
    name: Build Python package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/*
          retention-days: 7
