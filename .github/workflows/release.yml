name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # required for PyPI Trusted Publishing (OIDC)
  attestations: write    # required for build-provenance attestation

jobs:
  check-version:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
      should_release: ${{ steps.check-tag.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          RAW_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          VERSION="${RAW_VERSION#v}"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  Tag: $TAG"

      - name: Validate __init__.py matches
        run: |
          PYPROJECT_VERSION="${{ steps.get-version.outputs.version }}"
          INIT_VERSION=$(python -c "from cleanix import __version__; print(__version__)")
          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "__init__.py:    $INIT_VERSION"
          if [[ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != cleanix/__init__.py ($INIT_VERSION)"
            exit 1
          fi

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG="${{ steps.get-version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist, will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Create and push tag
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  build:
    name: Build artifacts
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/build.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, create-tag, build]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          for name in cleanix-linux-amd64 cleanix-macos-arm64; do
            if [ -f "artifacts/$name/$name" ]; then
              cp "artifacts/$name/$name" "release/$name"
              chmod +x "release/$name"
            fi
          done
          cp artifacts/python-package/* release/ || true
          ls -l release

      - name: Generate SHA256SUMS
        working-directory: release
        run: |
          # Checksums over every release asset so downloads can be verified.
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          # Keyless (Sigstore/OIDC) provenance for every shipped artifact —
          # verifiable with `gh attestation verify <file> --repo <owner>/<repo>`.
          subject-path: |
            release/cleanix-linux-amd64
            release/cleanix-macos-arm64
            release/*.whl
            release/*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Release ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/cleanix-linux-amd64
            release/cleanix-macos-arm64
            release/*.whl
            release/*.tar.gz
            release/SHA256SUMS

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [check-version, create-tag, build]
    if: needs.check-version.outputs.should_release == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/cleanix-cli
    permissions:
      id-token: write   # Trusted Publishing — no API token needed

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          # Trusted Publishing (OIDC) is used by default. To use an API token
          # instead, add a PYPI_API_TOKEN secret and uncomment:
          # password: ${{ secrets.PYPI_API_TOKEN }}
